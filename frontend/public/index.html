<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="icon" href="/logo4.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#5b6f00" />

  <!-- Canonical URL (VERY IMPORTANT) -->
  <link rel="canonical" href="https://www.expeditio.world/" />

  <!-- Primary SEO Title -->
  <title>AI Travel Planner in India | Free Itinerary Generator | Expeditio</title>

  <!-- SEO Description -->
  <meta name="description"
    content="Expeditio is an AI-powered travel planner that generates instant hourly, one-day, and multi-day itineraries. Plan smarter trips across India with AI." />

  <!-- Keywords (optional but fine) -->
  <meta name="keywords"
    content="AI travel planner India, itinerary generator, one day itinerary, multi day trip planner, free travel planner, Goa itinerary, Ladakh trip plan" />

  <meta name="author" content="Expeditio" />

  <!-- Open Graph (Social Sharing) -->
  <meta property="og:title" content="AI Travel Planner - Expeditio" />
  <meta property="og:description" content="Generate smart travel itineraries instantly using AI." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.expeditio.world/" />
  <meta property="og:image" content="https://www.expeditio.world/logo.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="AI Travel Planner - Expeditio" />
  <meta name="twitter:description" content="Instant AI-generated travel itineraries for your next trip." />
  <meta name="twitter:image" content="https://www.expeditio.world/logo.png" />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Expeditio",
    "url": "https://www.expeditio.world/",
    "applicationCategory": "TravelApplication",
    "operatingSystem": "All",
    "description": "AI-powered travel itinerary generator for hours, one-day and multi-day trips."
  }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
</head>

</html>
